# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

cursor_shape underline
cursor_shape_unfocused block
cursor_trail 1
cursor_trail_decay 0.01 0.2
cursor_trail_start_threshold 0

enable_audio_bell yes

window_padding_width 10 5
placement_strategy center
notify_on_cmd_finish invisible 20

# window behaviour
draw_minimal_borders no

window_border_width 1.5pt
active_border_color #F1E4D0
inactive_border_color #4c4a46
bell_border_color #F2412A

window_resize_step_cells 1
window_resize_step_lines 1

# Tab bar
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0

tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1

active_tab_foreground #1D1C1A
active_tab_background #F1E4D0
inactive_tab_foreground #F1E4D0
inactive_tab_background #4c4a46
tab_bar_background #1D1C1A
tab_powerline_style round

# Colors
foreground #F1E4D0
background #1D1C1B
background_opacity 0.5
cursor #F1E4D0

color0 #1D1C1A
color8 #4c4a46
color1 #852204
color9 #F2412A
color2 #4d7503
color10 #65E127
color3 #b3640b
color11 #EAD91F
color4 #1c5e5b
color12 #45CBCE
color5 #642b49
color13 #B945A4
color6 #18643b
color14 #40D894
color7 #89847d
color15 #F1E4D0
selection_foreground #1D1C1B
selection_background #F1E4D0

url_color #45CBCE


# shortcuts

map ctrl+shift+č previous_window
map ctrl+shift+ć next_window
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
map ctrl+shift+0 goto_tab 10

# BEGIN_KITTY_FONTS
font_family      family='Symbols Nerd Font Mono, DejaVu Sans Mono'
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
