### ANIMATIONS ###
###################
source = ./animations.conf

### WINDOW AND LAYER RULES ###
##############################
source = ./window_and_layer_rules.conf

### GENERAL ###
###############
# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = $gaps
    gaps_out = {{ 2 * $gaps }}

    border_size = $borders
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = true
    allow_tearing = false

    layout=dwindle

    snap{
        enabled = true
        respect_gaps = true
    }
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle{
    smart_split = false
    pseudotile = false
    preserve_split = true
}

scrolling{
    fullscreen_on_one_column = false
    follow_min_visible = 1.1
    focus_fit_method = 0
}

group{
    focus_removed_window = false
    col.border_active = $active_border
    col.border_inactive = $inactive_border
    col.border_locked_active = $active_border
    col.border_locked_inactive = $inactive_border
    groupbar{
        col.active = $active_border
        col.inactive =  $inactive_border
        indicator_height = 25
        indicator_gap = 0
        gaps_in = $gaps
        gaps_out = $gaps
        keep_upper_gap = false
        rounding = $rounding
        round_only_edges = false
        blur = true
        font_size = 14
        height = 1
        text_color = $text
        text_color_inactive = $active_border
        text_padding = $gaps
        text_offset = -13
        col.locked_active = $active_border
        col.locked_inactive = $black
    }
}
# https://wiki.hypr.land/Configuring/Variables/#cursor
cursor{
    default_monitor = eDP-1
    inactive_timeout = 180
    persistent_warps = true
    hide_on_key_press = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = $rounding
    rounding_power = 2

    dim_special = 0
    dim_around = 0

    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 50
        render_power = 2
        color = $active_shadow
        color_inactive= $inactive_shadow
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = $blur_size
        passes = $blur_passes

        vibrancy = $vibrancy
        vibrancy_darkness = $vibrancy_darkness
        noise = $noise
        contrast = $contrast

        popups = true
        ignore_opacity = false
        popups_ignorealpha = 0.49
    }
}
