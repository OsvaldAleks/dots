###############
### GENERAL ###
###############
# https://wiki.hyprland.org/Configuring/Keywords/
### Modifiers
$mainMod = SUPER

### Colors
$white = rgba(d3d4cbff)
$blue = rgba(acb4ebff)
$active_border = rgb(d3d4cb)
$inactive_border = rgba(14141e80)
$warning = rgba(e17b7bff)
$text = rgba(14141eff)
$active_shadow = rgba(14141eaa)
$inactive_shadow = rgba(14141e22)
$black = rgb(14141e)
$green = rgb(7bd687)

### Look and feel
$rounding = 5
$gaps = 5
$borders = 2

$blur_size = 5
$blur_passes = 3
$noise = 0.05
$contrast = 0.7
$vibrancy = 0.3
$vibrancy_darkness = 0.2


### Programs
$terminal = kitty
$fileManager = nautilus &
$browser = zen-browser
$menu = fuzzel
$menu-toggle = pkill fuzzel || $menu

#####################
### ENV VARIABLES ###
#####################
# https://wiki.hyprland.org/Configuring/Environment-variables/
env = HYPRSHOT_DIR,/home/aleks/Pictures/Screenshots

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
