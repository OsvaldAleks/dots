exec-once = qs -p .config/quickshell/main/shell.qml
exec-once = wl-gammarelay-rs &
exec-once = awww-daemon & ~/.config/hypr/scripts/wallpaperSwitcher.sh
exec-once = hyprctl setcursor Vimix-cursors 24
exec-once = hyprpm reload
exec-once = systemctl --user start hyprpolkitagent
exec-once = mpdas
exec-once = pactl load-module module-switch-on-connect

# Open Kitty on special workspace
exec-once = [workspace special:main silent; size 1480 960; pseudo] kitty
